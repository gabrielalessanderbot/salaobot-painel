    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://mlixzhjffvjnjyjxskgl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_PiBvpay1AJaRXvKG5ezP1g_l-0KLsGV';

        const urlParams = new URLSearchParams(window.location.search);
        const slugSalon = urlParams.get('cliente') || 'salao-modelo';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let clienteIdAtual = null;

        async function obterClienteId() {
            const { data, error } = await supabaseClient
                .from('clientes')
                .select('id, nome_salao')
                .eq('slug', slugSalon)
                .single();

            if (error || !data) {
                alert('Salão não encontrado. Verifique o link.');
                return null;
            }

            document.getElementById('nomeSalao').textContent = 'Salão: ' + data.nome_salao;
            return data.id;
        }

        function gerarHorarios() {
            const select = document.getElementById('horario');
            select.innerHTML = '<option value="">Selecione o horário</option>';
            
            for (let hora = 8; hora <= 21; hora++) {
                const horaStr = hora.toString().padStart(2, '0');
                const minutosMax = (hora === 21) ? 15 : 55;
                for (let min = 0; min <= minutosMax; min += 5) {
                    const minStr = min.toString().padStart(2, '0');
                    const value = `${horaStr}:${minStr}`;
                    const option = document.createElement('option');
                    option.value = value;
                    option.textContent = value;
                    select.appendChild(option);
                }
            }
        }

        (async () => {
            clienteIdAtual = await obterClienteId();
            gerarHorarios();
        })();

        async function carregarAgenda() {
            if (!clienteIdAtual) return;
            const data = document.getElementById('data').value;
            if (!data) return alert('Selecione uma data');

            const { data: agendamentos, error } = await supabaseClient
                .from('agendamentos')
                .select('*')
                .eq('cliente_id', clienteIdAtual)
                .eq('data', data)
                .order('horario');

            if (error) {
                console.error('Erro ao carregar agenda:', error);
                return alert('Erro ao carregar agenda: ' + error.message);
            }

            const tbody = document.getElementById('tabela');
            tbody.innerHTML = '';
            (agendamentos || []).forEach(a => {
                tbody.innerHTML += `
                <tr>
                    <td>${(a.horario || '').toString().slice(0,5)}</td>
                    <td>${a.servico_nome || ''}</td>
                    <td>${a.nome_cliente || ''}</td>
                    <td>${a.telefone_cliente || ''}</td>
                    <td>${a.profissional || ''}</td>
                    <td>${a.status === 'agendado' ? 'agendado' : a.status}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="mudarStatus('${a.id}','concluido')">Concluir</button>
                        <button class="btn btn-sm btn-danger" onclick="mudarStatus('${a.id}','cancelado')">Cancelar</button>
                    </td>
                </tr>`;
            });
        }

        async function mudarStatus(id, status) {
            const { error } = await supabaseClient
                .from('agendamentos')
                .update({ status })
                .eq('id', id);
            if (error) return alert('Erro: ' + error.message);
            carregarAgenda();
        }

        async function adicionarAgendamento() {
            if (!clienteIdAtual) return;
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const servico = document.getElementById('servico').value;
            const profissional = document.getElementById('profissional').value;
            const data = document.getElementById('novaData').value;
            const horario = document.getElementById('horario').value;

            if (!nome || !servico || !data || !horario) return alert('Preencha todos os campos obrigatórios.');

            const { error } = await supabaseClient
                .from('agendamentos')
                .insert({
                    cliente_id: clienteIdAtual,
                    data,
                    horario: horario + ':00',
                    servico_nome: servico,
                    nome_cliente: nome,
                    telefone_cliente: telefone,
                    profissional: profissional,
                    status: 'agendado'
                });
            if (error) return alert('Erro: ' + error.message);

            document.getElementById('data').value = data;
            carregarAgenda();
            ['nome','telefone','servico','profissional','novaData'].forEach(id => document.getElementById(id).value='');
            document.getElementById('horario').selectedIndex = 0;
        }
    </script>
